<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Dashboard{% endblock %}</title>

    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'fidpha/style.css' %}">
</head>
<body>

<nav >

    <a href="{% url 'fidpha:client_dashboard' %}">DASHBOARD</a>
    <a href="{% url 'fidpha:client_details' %}">CLIENT DETAILS</a>

   {% if user.is_authenticated %}
   <form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" >
        LOGOUT
    </button>
</form>
{% endif %}
</nav>



<hr>

{% block content %}
{% endblock %}

</body>
</html>
